name: Validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: assets/example-project/package-lock.json
      - name: Install media tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ffmpeg
      - name: Check launchers and scripts
        run: |
          node --check scripts/notebook-video.mjs
          for file in scripts/*.sh; do bash -n "$file"; done
          python3 -c "from pathlib import Path; [compile(path.read_text(encoding='utf-8'), str(path), 'exec') for path in Path('scripts').glob('*.py')]"
      - name: Validate skill and official example
        run: |
          test -z "$(find . -type d \( -name node_modules -o -name .tools -o -name .cache -o -name renders -o -name __pycache__ \) -print -quit)"
          node scripts/notebook-video.mjs check-deps
          node scripts/notebook-video.mjs validate-skill
          node scripts/notebook-video.mjs validate-official-example
      - name: Audit locked dependencies
        working-directory: assets/example-project
        run: npm audit --package-lock-only --ignore-scripts --audit-level=high
      - name: Smoke-test project creation
        run: |
          mkdir "$RUNNER_TEMP/notebook-video-smoke"
          node scripts/notebook-video.mjs new-project "$RUNNER_TEMP/notebook-video-smoke"
          test -f "$RUNNER_TEMP/notebook-video-smoke/src/index.tsx"
          test -f "$RUNNER_TEMP/notebook-video-smoke/public/SourceHanSans-LICENSE.txt"
