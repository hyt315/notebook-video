version: 2
updates:
  - package-ecosystem: npm
    directory: /assets/example-project
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      remotion:
        patterns:
          - "@remotion/*"
          - remotion
      react:
        patterns:
          - react
          - react-dom
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
