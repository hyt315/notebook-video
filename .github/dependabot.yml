version: 2
updates:
  - package-ecosystem: npm
    directory: /assets/example-project
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      react:
        patterns:
          - react
          - react-dom
    ignore:
      # Remotion is a style-engine pin, not an ordinary library update.
      # Upgrade it only with a rendered visual review and contract update.
      - dependency-name: "@remotion/*"
      - dependency-name: remotion
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
